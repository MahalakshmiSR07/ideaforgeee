{% extends 'core/base.html' %}
{% block title %}Login - Ideaforge{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="card p-4" style="width: 100%; max-width: 400px;">
        <h2 class="text-center mb-4 text-primary">Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'password_reset' %}" class="text-secondary" style="font-size: 0.9rem;">Forgot Password?</a>
        </div>
        <p class="mt-3 text-center">Don't have an account? <a href="{% url 'register' %}" class="text-accent">Register</a></p>
    </div>
</div>
{% endblock %}
